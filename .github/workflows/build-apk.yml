name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web app
        run: |
          npm ci
          npm run build

      - name: Install Bubblewrap and build APK
        run: |
          npm install -g @bubblewrap/cli
          # Generate TWA (Trusted Web Activity) config and build APK
          npx bubblewrap init --manifest "https://y7208275-cell.github.io/-fitness-tracker/manifest.json" --directory apk-output || true
          if [ -d "apk-output" ]; then
            cd apk-output
            npx bubblewrap build || true
            cd ..
          fi

      - name: Try alternative - use PWABuilder API
        run: |
          curl -s -X POST "https://pwabuilder.cloudcomputing.xyz/api/android/package?url=https://y7208275-cell.github.io/-fitness-tracker/" -o app.apk || echo "API failed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fitness-tracker-apk
          path: |
            *.apk
            apk-output/*.apk
            app.apk
          if-no-files-found: warn
